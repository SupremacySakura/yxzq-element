<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Web Components - HTML</title>
  </head>
  <body>
    <main>
      <h1>原生 HTML 消费示例</h1>
      <super-button variant="primary" shape="pill">
        <span slot="prefix" aria-hidden="true">☆</span>
        自定义按钮内容
      </super-button>
      <super-input
        type="search"
        placeholder="搜索关键词"
        clearable
        aria-label="搜索关键词"
      >
        <span slot="suffix" aria-hidden="true">⌕</span>
      </super-input>
      <section class="select-demo" aria-labelledby="select-title">
        <div>
          <h2 id="select-title">手绘标签筛选</h2>
          <p>可搜索、多选，并直接使用原生 option / optgroup。</p>
        </div>
        <super-select
          multiple
          searchable
          clearable
          name="topics"
          placeholder="选择兴趣标签"
          search-placeholder="搜索标签"
          aria-label="兴趣标签"
        >
          <span slot="prefix" aria-hidden="true">☆</span>
          <optgroup label="创作">
            <option value="sketch" selected>手绘</option>
            <option value="photo">摄影</option>
          </optgroup>
          <optgroup label="生活">
            <option value="travel" selected>旅行</option>
            <option value="music">音乐</option>
          </optgroup>
        </super-select>
      </section>
      <section class="selector-suite" aria-labelledby="selector-title">
        <h2 id="selector-title">选择器套装</h2>
        <super-checkbox checked>接收更新通知</super-checkbox>
        <fieldset class="radio-options">
          <legend>版本</legend>
          <super-radio name="plan" value="standard" checked>
            标准版
          </super-radio>
          <super-radio name="plan" value="advanced">
            高级版
          </super-radio>
        </fieldset>
        <super-switch checked aria-label="自动同步">
          自动同步
        </super-switch>
      </section>
      <output>等待点击</output>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
