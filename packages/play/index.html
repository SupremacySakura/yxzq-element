<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Web Components - HTML</title>
  </head>
  <body>
    <main>
      <h1>原生 HTML 消费示例</h1>
      <super-button variant="primary" shape="pill">
        <span slot="prefix" aria-hidden="true">☆</span>
        自定义按钮内容
      </super-button>
      <super-input
        type="search"
        placeholder="搜索关键词"
        clearable
        aria-label="搜索关键词"
      >
        <span slot="suffix" aria-hidden="true">⌕</span>
      </super-input>
      <output>等待点击</output>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
